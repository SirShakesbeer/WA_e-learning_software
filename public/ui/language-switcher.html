<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Switcher</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: rgba(18, 18, 18, 0.92);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .panel {
      width: 118px;
      border-radius: 10px;
      background: rgba(30, 30, 30, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 8px;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
      font-size: 20px;
      line-height: 1;
      height: 42px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
    }

    button.active {
      border-color: #60a5fa;
      background: rgba(59, 130, 246, 0.28);
      box-shadow: inset 0 0 0 1px rgba(147, 197, 253, 0.45);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="panel" aria-label="Language selector">
    <button id="btn-de" type="button" title="Deutsch" aria-label="Deutsch">🇩🇪</button>
    <button id="btn-en" type="button" title="English" aria-label="English">🇬🇧</button>
  </div>

  <script src="https://play.workadventu.re/iframe_api.js"></script>
  <script>
    const LANGUAGE_VARIABLE_KEY = "preferredLanguage";
    const LANGUAGE_TTL_SECONDS = 24 * 3600;

    const buttonDe = document.getElementById("btn-de");
    const buttonEn = document.getElementById("btn-en");

    function setActive(language) {
      buttonDe.classList.toggle("active", language === "de");
      buttonEn.classList.toggle("active", language === "en");
    }

    function setBusy(isBusy) {
      buttonDe.disabled = isBusy;
      buttonEn.disabled = isBusy;
    }

    async function loadLanguage() {
      const current = await WA.player.state.loadVariable(LANGUAGE_VARIABLE_KEY);
      return current === "en" ? "en" : "de";
    }

    async function saveLanguage(language) {
      setBusy(true);
      try {
        await WA.player.state.saveVariable(LANGUAGE_VARIABLE_KEY, language, {
          public: false,
          persist: true,
          ttl: LANGUAGE_TTL_SECONDS,
          scope: "world",
        });
        setActive(language);
      } finally {
        setBusy(false);
      }
    }

    WA.onInit().then(async () => {
      const initialLanguage = await loadLanguage();
      setActive(initialLanguage);

      buttonDe.addEventListener("click", () => {
        void saveLanguage("de");
      });

      buttonEn.addEventListener("click", () => {
        void saveLanguage("en");
      });
    });
  </script>
</body>
</html>
