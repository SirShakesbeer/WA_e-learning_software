<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planungsfortschritt</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      font-family: "Segoe UI", sans-serif;
      color: #fff;
    }

    .wrapper {
      box-sizing: border-box;
      height: 100%;
      width: 100%;
      padding: 16px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .bar {
      position: relative;
      height: 88%;
      width: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0%;
      background: linear-gradient(180deg, #80e46b 0%, #38b000 100%);
      transition: height 300ms ease;
    }

    .label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.95;
      user-select: none;
    }

    .level {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.95;
      user-select: none;
      text-align: center;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="bar" aria-label="Planungsfortschritt">
      <div id="fill" class="fill"></div>
    </div>
    <div class="meta">
      <div id="label" class="label">0%</div>
      <div id="level" class="level">Level 1/1</div>
    </div>
  </div>

  <script>
    const query = new URLSearchParams(window.location.search);
    const percentRaw = Number(query.get("percent") || 0);
    const done = Number(query.get("done") || 0);
    const total = Number(query.get("total") || 0);
    const level = Number(query.get("level") || 1);
    const totalLevels = Number(query.get("totalLevels") || 1);
    const levelLabel = query.get("levelLabel") || `Level ${level}`;

    const percent = Math.max(0, Math.min(100, Number.isFinite(percentRaw) ? percentRaw : 0));
    const sanitizedLevel = Number.isFinite(level) ? Math.max(1, Math.floor(level)) : 1;
    const sanitizedTotalLevels = Number.isFinite(totalLevels) ? Math.max(1, Math.floor(totalLevels)) : 1;

    const fill = document.getElementById("fill");
    const label = document.getElementById("label");
    const levelElement = document.getElementById("level");

    fill.style.height = `${percent}%`;
    label.textContent = `${percent}% (${done}/${total})`;
    levelElement.textContent = `${levelLabel} (${sanitizedLevel}/${sanitizedTotalLevels})`;
  </script>
</body>
</html>
