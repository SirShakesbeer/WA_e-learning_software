<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Achievement Unlocked!</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #121212;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
      padding: 0 20px;
      animation: pop 0.8s ease-out;
    }

    @keyframes pop {
      0% {
        transform: scale(0.6);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>
  <h1>🏆 UML Mastery II! 🏆</h1>
  <h2>You mastered level 2 as well! 🎉</h2>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    const canvas = document.getElementById('confetti-canvas');
    const confetti = window.confetti.create(canvas, {
      resize: true,
      useWorker: true
    });

    confetti({
      particleCount: 150,
      spread: 90,
      origin: { y: 0.6 }
    });

    let count = 0;
    const interval = setInterval(() => {
      confetti({
        particleCount: 100,
        spread: 80,
        origin: { y: 0.6 }
      });
      count++;
      if (count >= 3) clearInterval(interval);
    }, 2000);
  </script>
</body>
</html>
